<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'Mongol';
            src: url("static/fonts/NotoSansMongolian-Regular.ttf") format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Mongol', sans-serif;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 5px;
            text-align: left;
        }

        th {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <h2>Хуваарь</h2>
    <table>
        <tr>
            <th>Өдөр</th>
            <th>Цаг</th>
            <th>Хичээл</th>
            <th>Багш</th>
            <th>Танхим</th>
            <th>Бүлэг</th>
        </tr>
        {% for entry in data %}
        <tr>
            <td>{{ entry.day }}</td>
            <td>{{ entry.time }}</td>
            <td>{{ entry.course_name }}</td>
            <td>{{ entry.teacher }}</td>
            <td>{{ entry.room }}</td>
            <td>{{ entry.groups|join:", " }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
